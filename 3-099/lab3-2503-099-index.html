<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <link rel="stylesheet" href="book3.css">
</head>
<body>

<div class="header">
    <div class="logo">图书网</div>
    <ul class="nav">
        <li>首页</li>
        <li>图书分类</li>
        <li>热门推荐</li>
        <li>关于我们</li>
        <li id="loginBtn">登录/注册</li> 
    </ul>
</div>


<div class="container">
    <div class="left">
        <h3>图书分类</h3>
        <ul>
            <li>计算机</li>
            <li>文学小说</li>
            <li>历史哲学</li>
            <li>生活健康</li>
        </ul>
    </div>
    <div class="middle">
        <div class="book-item">
            <img src="img/14.jpg">
            <div class="tip">热卖中</div>
        </div>
        <div class="book-item"><img src="img/15.jpg"></div>
        <div class="book-item"><img src="img/16.jpg"></div>
        <div class="book-item"><img src="img/17.jpg"></div>
        <div class="hot">热门推荐</div>
        <table border="1">
            <tr>
                <td>书名</td>
                <td>价格</td>
                <td>出版社</td>
            </tr>
            <tr>
                <td>HTML从入门到精通</td>
                <td>59元</td>
                <td>机械工业</td>
            </tr>
            <tr>
                <td>CSS布局实战</td>
                <td>49元</td>
                <td>人民邮电</td>
            </tr>
            <tr>
                <td>JavaScript权威指南</td>
                <td>129元</td>
                <td>电子工业</td>
            </tr>
            <tr>
                <td>Python编程</td>
                <td>69元</td>
                <td>清华大学</td>
            </tr>
            <tr>
                <td>大学计算机基础</td>
                <td>39元</td>
                <td>高等教育</td>
            </tr>
        </table>
    </div>
    <div class="right">
        促销信息<br>
        满100减20
    </div>
</div>

<div class="modal" id="loginModal">
    
    <div class="modal-content">
        
        <div class="modal-tabs">
            <span class="tab active" id="loginTab">登录</span>
            <span class="tab" id="regTab">注册</span>
            <span class="close" id="closeBtn">×</span>
        </div>
        <!-- 登录表单 -->
        <div class="form-box" id="loginForm">
            <h4>用户登录</h4>
            <input type="text" id="loginUser" placeholder="请输入用户名" required>
            <input type="password" id="loginPwd" placeholder="请输入密码" required>
            <button id="doLogin">登录</button>
            <p class="tip-text" id="loginTip"></p>
        </div>
        
        <div class="form-box" id="regForm" style="display: none;">
            <h4>用户注册</h4>
            <input type="text" id="regUser" placeholder="请设置用户名" required>
            <input type="password" id="regPwd" placeholder="请设置密码" required>
            <button id="doReg">注册</button>
            <p class="tip-text" id="regTip"></p>
        </div>
    </div>
</div>


<script>
    
    const loginBtn = document.getElementById('loginBtn');
    const loginModal = document.getElementById('loginModal');
    const closeBtn = document.getElementById('closeBtn');
    const loginTab = document.getElementById('loginTab');
    const regTab = document.getElementById('regTab');
    const loginForm = document.getElementById('loginForm');
    const regForm = document.getElementById('regForm');
    const doLogin = document.getElementById('doLogin');
    const doReg = document.getElementById('doReg');
    const loginTip = document.getElementById('loginTip');
    const regTip = document.getElementById('regTip');

    
    loginBtn.onclick = () => { loginModal.style.display = 'block'; }
    closeBtn.onclick = () => { loginModal.style.display = 'none'; }
    // 点击弹窗外部关闭
    window.onclick = (e) => {
        if (e.target === loginModal) loginModal.style.display = 'none';
    }
    loginTab.onclick = () => {
        loginTab.classList.add('active');
        regTab.classList.remove('active');
        loginForm.style.display = 'block';
        regForm.style.display = 'none';
    }
    regTab.onclick = () => {
        regTab.classList.add('active');
        loginTab.classList.remove('active');
        regForm.style.display = 'block';
        loginForm.style.display = 'none';
    }

    
    doReg.onclick = () => {
        const username = document.getElementById('regUser').value;
        const password = document.getElementById('regPwd').value;
        if (!username || !password) {
            regTip.innerText = '用户名/密码不能为空！';
            regTip.style.color = 'red';
            return;
        }
        
        let users = JSON.parse(localStorage.getItem('bookStoreUsers')) || {};
        if (users[username]) {
            regTip.innerText = '用户名已存在！';
            regTip.style.color = 'red';
        } else {
            users[username] = password;
            
            localStorage.setItem('bookStoreUsers', JSON.stringify(users));
            regTip.innerText = '注册成功！可切换至登录';
            regTip.style.color = 'green';
            
            document.getElementById('regUser').value = '';
            document.getElementById('regPwd').value = '';
        }
    }

    
    doLogin.onclick = () => {
        const username = document.getElementById('loginUser').value;
        const password = document.getElementById('loginPwd').value;
        if (!username || !password) {
            loginTip.innerText = '用户名/密码不能为空！';
            loginTip.style.color = 'red';
            return;
        }
        
        let users = JSON.parse(localStorage.getItem('bookStoreUsers')) || {};
        if (users[username] && users[username] === password) {
            loginTip.innerText = '登录成功！';
            loginTip.style.color = 'green';
            
            setTimeout(() => { loginModal.style.display = 'none'; }, 1000);
        } else {
            loginTip.innerText = '用户名或密码错误！';
            loginTip.style.color = 'red';
        }
    }
</script>

</body>
</html>
